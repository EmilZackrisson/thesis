apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-udp-udpecho-eg
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: udpecho
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.200.200.0/24
      ports:
        - protocol: UDP
          port: 32000
          endPort: 32768
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tcp-grecho-eg
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: grecho
  policyTypes:
    - Egress
  egress:
    - to:
        - ipBlock:
            cidr: 10.200.200.0/24
      ports:
        - protocol: TCP
          port: 32000
          endPort: 32768
