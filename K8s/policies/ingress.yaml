apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-udp-1500-in
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: udpecho
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.200.200.0/24
      ports:
        - protocol: UDP
          port: 1500
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tcp-8001-in
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: grecho
  policyTypes:
    - Ingress
  ingress:
    - from:
        - ipBlock:
            cidr: 10.200.200.0/24
      ports:
        - protocol: TCP
          port: 8001
